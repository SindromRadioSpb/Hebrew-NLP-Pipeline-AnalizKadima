# config/config.cfg — spaCy pipeline configuration for KADIMA
# R-1.6: Full spaCy config with NeoDictaBERT transformer backbone
#
# Usage:
#   python -m spacy debug data config/config.cfg
#   python -m spacy train config/config.cfg --output ./output
#
# The transformer backbone (kadima_transformer) is optional:
#   - use_transformer = true  → NeoDictaBERT embeddings (requires GPU/download)
#   - use_transformer = false → rule-based only (default, always works)

[nlp]
lang = "he"
pipeline = ["kadima_transformer","kadima_sent_split","kadima_morph","ngram_extractor","np_chunk_component","noise_component"]
disabled = ["kadima_transformer"]
batch_size = 128

[nlp.tokenizer]
@tokenizers = "spacy.Tokenizer.v1"

# ── Transformer backbone ───────────────────────────────────────────────────

[components.kadima_transformer]
factory = "kadima_transformer"

[components.kadima_transformer.model_name]
# HuggingFace model ID — change to local path after download
# ./scripts/download_models.sh downloads to F:\datasets_models\
model_name = "dicta-il/neodictabert"

[components.kadima_transformer.settings]
max_length = 512
device = "cpu"
fp16 = false

# ── NLP components ─────────────────────────────────────────────────────────

[components.kadima_sent_split]
factory = "kadima_sent_split"

[components.kadima_morph]
factory = "kadima_morph"

[components.ngram_extractor]
factory = "ngram_extractor"
min_n = 2
max_n = 5

[components.np_chunk_component]
factory = "np_chunk_component"

[components.noise_component]
factory = "noise_component"

# ── Training (used only by spacy train) ───────────────────────────────────

[training]
max_steps = 20000
eval_frequency = 200
patience = 1600
accumulate_gradient = 3
dropout = 0.1
seed = 42

[training.optimizer]
@optimizers = "Adam.v1"
beta1 = 0.9
beta2 = 0.999
L2_is_weight_decay = true
L2 = 0.01
grad_clip = 1.0
use_averages = false

[training.optimizer.learn_rate]
@schedules = "warmup_linear.v1"
warmup_steps = 250
total_steps = 20000
initial_rate = 5e-5

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = false
tolerance = 0.2
get_length = null

[training.batcher.size]
@schedules = "compounding.v1"
start = 100
stop = 1000
compound = 1.001

[training.score_weights]
ents_f = 0.5
ents_p = 0.0
ents_r = 0.0

[paths]
train = null
dev = null
vectors = null
init_tok2vec = null

[system]
gpu_allocator = "pytorch"
seed = 42
